<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouton qui fuit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #attrapeMoi {
      position: absolute;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #ff0000;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
  /* On a enlevé 'left' et 'top' de la transition pour qu'il se téléporte ! */
      transition: transform 0.2s; 
    }

    #attrapeMoi:hover {
      transform: scale(1.1);
    }

    #image {
      display: none;
      text-align: center;
    }

    #image img {
      max-width: 100%;
      max-height: 80vh;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="attrapeMoi">Attrape-moi</button>
    <div id="image">
      <p>Bravo ! Vous avez gagnez!!!! :</p>
      <img src="https://i.ytimg.com/vi/DwIy4kXMQAc/maxresdefault.jpg" alt="Félicitations !">
    </div>
  </div>

  <script>
    const button = document.getElementById('attrapeMoi');
    const container = document.getElementById('container');
    const imageDiv = document.getElementById('image');

    button.addEventListener('mouseover', () => {
      const containerRect = container.getBoundingClientRect();
      const buttonRect = button.getBoundingClientRect();

      const maxX = containerRect.width - buttonRect.width;
      const maxY = containerRect.height - buttonRect.height;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      button.style.left = `${randomX}px`;
      button.style.top = `${randomY}px`;
    });

    button.addEventListener('click', () => {
      button.style.display = 'none';
      imageDiv.style.display = 'block';
    });
  </script>
</body>
</html>
