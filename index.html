<html>
<head>
    <title>Le Bouton Fuaynt</title>
    <style>
        #myButton {
            position: absolute;
            transition: 0.2s;
        }
    </style>
</head>
<body>
    <button id="myButton" style="left: 50%; top: 50%;">Click Me!</button>
    <script>
        const button = document.getElementById('myButton');
        document.addEventListener('mousemove', (event) => {
            const buttonRect = button.getBoundingClientRect();
            const mouseX = event.clientX;
            const mouseY = event.clientY;

            if (mouseX > buttonRect.left && mouseX < buttonRect.right && 
                mouseY > buttonRect.top && mouseY < buttonRect.bottom) {
                // Move the button away from the cursor
                button.style.left = Math.random() * (window.innerWidth - buttonRect.width) + 'px';
                button.style.top = Math.random() * (window.innerHeight - buttonRect.height) + 'px';
            }
        });
    </script>
</body>
</html>
