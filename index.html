<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bouton qui fuit</title><style>body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background-color:#f0f0f0}#container{position:relative;width:100%;height:100%}#attrapeMoi{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:10px 20px;font-size:16px;background-color:#ff0000;color:#fff;border:0;border-radius:5px;cursor:pointer;transition:transform .2s}#attrapeMoi:hover{transform:translate(-50%,-50%) scale(1.1)}#image{display:none;text-align:center}#image img{max-width:100%;max-height:80vh}#easterEggBtn{position:fixed;bottom:20px;right:20px;width:40px;height:40px;background-color:transparent;border:0;cursor:pointer;z-index:10;opacity:.1}#videoOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center}#easterVideo{width:100%;height:100%;object-fit:contain}#transitionOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0);z-index:1000;opacity:0;transition:opacity 2s ease-in-out}#transitionOverlay.darkening{opacity:1;background-color:#000}#congratulations{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);z-index:1001;justify-content:center;align-items:center;flex-direction:column;text-align:center;opacity:0;animation:fadeIn 1s ease-in-out .5s forwards}#congratulations h1{color:#fff;font-size:48px;margin-bottom:20px;animation:screamer .3s ease-in-out 2.5s}#congratulations p{color:#fff;font-size:24px;margin-bottom:30px}#congratulations button{padding:15px 40px;font-size:18px;background-color:#fff;color:#667eea;border:0;border-radius:50px;cursor:pointer;font-weight:bold;transition:transform .2s}#congratulations button:hover{transform:scale(1.05)}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes screamer{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}</style></head><body><div id="container"><button id="attrapeMoi">Attrape-moi</button><div id="image"><p>Bravo ! Vous avez gagnez!!!! :</p><img src="https://i.ytimg.com/vi/DwIy4kXMQAc/maxresdefault.jpg" alt="Félicitations !"></div></div><button id="easterEggBtn"></button><div id="videoOverlay"><video id="easterVideo"><source src="https://i.makeagif.com/media/5-11-2025/A9yB1G.mp4" type="video/mp4">Votre navigateur ne supporte pas la vidéo.</video></div><div id="transitionOverlay"></div><div id="congratulations"><h1>🎉 Easter Egg Trouvé ! 🎉</h1><p>Vous avez découvert le secret caché !</p></div><script>const a=document.getElementById('attrapeMoi'),b=document.getElementById('container'),c=document.getElementById('image'),d=document.getElementById('easterEggBtn'),e=document.getElementById('videoOverlay'),f=document.getElementById('easterVideo'),g=document.getElementById('congratulations'),h=document.getElementById('transitionOverlay');a.addEventListener('mouseover',()=>{const i=b.getBoundingClientRect(),j=a.getBoundingClientRect(),k=100,l=i.width-j.width-k,m=i.height-j.height-k;let n,o;do{n=Math.random()*l,o=Math.random()*m}while(n>l-k&&o>m-k);a.style.left=`${n}px`,a.style.top=`${o}px`,a.style.transform='translate(0, 0) scale(1)'}),a.addEventListener('click',()=>{a.style.display='none',c.style.display='block'}),d.addEventListener('click',()=>{e.style.display='flex',f.play()}),f.addEventListener('ended',()=>{e.style.display='none',h.style.display='block',setTimeout(()=>{h.classList.add('darkening')},50),setTimeout(()=>{g.style.display='flex'},1e3),p(),setTimeout(()=>{location.reload()},6e3)});function p(){const q=new(window.AudioContext||window.webkitAudioContext)(),r=q.createOscillator(),s=q.createGain();r.connect(s),s.connect(q.destination),r.frequency.value=800,s.gain.setValueAtTime(.3,q.currentTime),s.gain.exponentialRampToValueAtTime(.01,q.currentTime+.2),r.start(q.currentTime),r.stop(q.currentTime+.2)}</script></body></html>
