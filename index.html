<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Le Bouton Fuaynt</title>\n    <style>\n        #easterEggButton {\n            position: fixed;\n            bottom: 10px;\n            right: 10px;\n            display: none;\n            z-index: 1000;\n        }\n        #darkOverlay {\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background-color: rgba(0, 0, 0, 0.8);\n            display: none;\n            z-index: 999;\n        }\n    </style>\n</head>\n<body>\n    <h1>Welcome to Le Bouton Fuaynt</h1>\n    <div id="darkOverlay"></div>\n    <button id="easterEggButton">Click Me!</button>\n    <script>\n        // Show button after a delay\n        setTimeout(() => {\n            document.getElementById('easterEggButton').style.display = 'block';\n        }, 2000);\n\n        // Add event listener for the button click\n        document.getElementById('easterEggButton').addEventListener('click', function() {\n            // Display dark overlay\n            document.getElementById('darkOverlay').style.display = 'block';\n\n            // Create knight kneeling gif\n            const knightGif = document.createElement('img');\n            knightGif.src = 'path/to/your/knight-kneeling.gif'; // Replace with the actual gif path\n            knightGif.style.position = 'fixed';\n            knightGif.style.bottom = '50%';\n            knightGif.style.left = '50%';\n            knightGif.style.transform = 'translate(-50%, 50%)';\n            knightGif.style.zIndex = '1001';\n            document.body.appendChild(knightGif);\n\n            // Display easter egg text\n            setTimeout(() => {\n                alert('Easter Egg Unlocked! 🎉');\n                document.body.removeChild(knightGif);\n                document.getElementById('darkOverlay').style.display = 'none';\n            }, 5000); // Adjust timing as needed\n        });\n    <\/script>\n</body>\n</html>
