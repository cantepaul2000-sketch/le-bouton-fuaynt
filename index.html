<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Bouton Fuaynt</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        #content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="content">
        <h1>Welcome to Le Bouton Fuaynt</h1>
        <p>This is your interactive button demo.</p>
        <button id="fuayntBtn">Click me!</button>
        <div id="message" style="margin-top: 20px;"></div>
    </div>
    <script>
        // Source code protection
        Object.freeze(LeBoutonFuaynt);
        const btn = document.getElementById('fuayntBtn');
        const messageDiv = document.getElementById('message');

        btn.addEventListener('click', () => {
            messageDiv.textContent = 'Button clicked!';
        });
    </script>
</body>
</html>
